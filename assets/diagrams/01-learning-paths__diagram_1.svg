  <text x="755.0474999999999" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="755.0474999999999" dy="-3.9000000000000012">🔍 interview</tspan><tspan x="755.0474999999999" dy="16.900000000000002">소크라테스적 인터뷰</tspan></text>
</g>
<g class="node" data-id="E" data-label="📋 seed

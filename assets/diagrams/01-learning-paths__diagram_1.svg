  <text x="950.9604999999999" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="950.9604999999999" dy="-3.9000000000000012">📋 seed</tspan><tspan x="950.9604999999999" dy="16.900000000000002">사양 결정화</tspan></text>
</g>
</svg>
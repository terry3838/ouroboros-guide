  <text x="315.427" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="315.427" dy="-3.9000000000000012">👋 welcome</tspan><tspan x="315.427" dy="16.900000000000002">시스템 상태 확인</tspan></text>
</g>
<g class="node" data-id="C" data-label="📖 tutorial
전체 워크플로우 체험" data-shape="rectangle">
  <rect x="438.495" y="40" width="179.77599999999998" height="53.800000000000004" rx="0" ry="0" fill="#e8f4f8" stroke="#2196F3" stroke-width="0.75" />
  <text x="528.383" y="66.9" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="528.383" dy="-3.9000000000000012">📖 tutorial</tspan><tspan x="528.383" dy="16.900000000000002">전체 워크플로우 체험</tspan></text>

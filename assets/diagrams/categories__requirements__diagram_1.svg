<polyline class="edge" data-from="INT" data-to="PM" data-style="dotted" data-arrow-start="false" data-arrow-end="true" data-label="PM 특화 시" points="196.98691666666667,263.90000000000003 196.98691666666667,299.90000000000003 240.59299999999996,299.90000000000003 240.59299999999996,380.20000000000005" fill="none" stroke="var(--_line)" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="BF" data-to="INT" data-label="코드 컨텍스트 주입">

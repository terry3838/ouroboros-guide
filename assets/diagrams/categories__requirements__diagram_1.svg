  <text x="99.1365" y="407.1" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="99.1365" dy="-3.9000000000000012">📋 seed</tspan><tspan x="99.1365" dy="16.900000000000002">사양 결정화</tspan></text>
</g>
<g class="node" data-id="PRD" data-label="📑 PRD 문서" data-shape="rectangle">
  <rect x="181.827" y="550.3000000000001" width="117.532" height="36.900000000000006" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="240.593" y="568.7500000000001" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)" dy="4.55">📑 PRD 문서</text>
</g>
</svg>